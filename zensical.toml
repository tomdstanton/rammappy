site_name = "rammappy docs"
site_description = "A Python interface to rammap, the Rust implementation of minimap2"
site_url = "https://tomdstanton.github.io/rammappy/"
repo_url = "https://github.com/tomdstanton/rammappy"
repo_name = "tomdstanton/rammappy"
site_author = "Tom Stanton"
nav = [
    { "Home" = "index.md" },
    { "API Reference" = [
        { "Overview" = "api/index.md" },
        { "Align" = "api/align.md" },
        { "Sketch" = "api/sketch.md" },
        { "IO" = "api/io.md" }
    ] },
    { "Development" = [
        { "Contributing" = "contributing.md" }
    ] },
 # { "Performance & Benchmarks" = "benchmarks.md" },
]
language = "en"
copyright = """
Copyright &copy; 2026 <a href="https://tomdstanton.com" target="_blank">Tom Stanton</a>
"""

[[extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/tomdstanton/rammappy"

[[extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/rammappy/"

[theme]
name = "catppuccin"
icon.repo = "fontawesome/brands/github"
icon.logo = "lucide/dna-off"
font.text = "Noto Sans"
font.code = "JetBrains Mono"
features = [
    "announce.dismiss",
    "content.code.copy",
    "header.autohide",
    "navigation.top",
    "navigation.footer",
    "navigation.tabs",
    "navigation.tracking",
    "navigation.sections",
    "navigation.expand",
    "navigation.instant",
    "navigation.instant.progress",
    "search.suggest",
    "search.highlight" ,
    "search.share",
    "toc.follow",
]

[markdown_extensions]
admonition = {}
"pymdownx.details" = {}
"pymdownx.tabbed" = { alternate_style = true }
"pymdownx.highlight" = { anchor_linenums = true, use_pygments = true }
"pymdownx.inlinehilite" = {}
"pymdownx.arithmatex" = { generic = true }
toc = { permalink = true, title = "On this page" }
footnotes = {}
[markdown_extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[plugins]
search = {}

[plugins.mkdocstrings.handlers.python]
paths = ["python"]

[plugins.mkdocstrings.handlers.python.options]
filters = ["!^__doc__$", "!^__module__$"]